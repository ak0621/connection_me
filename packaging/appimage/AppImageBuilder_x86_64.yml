# AppImage recipe modeled after LocalSend's Linux AppDir packaging flow.
version: 1
script:
  - which mksquashfs || apt install -y squashfs-tools

AppDir:
  path: AppDir
  app_info:
    id: org.mybarrier.MyBarrier
    name: MyBarrier
    icon: mybarrier
    version: latest
    exec: usr/bin/MyBarrier
    exec_args: $@
  apt:
    arch:
      - amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
      - sourceline: deb http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
      - sourceline: deb http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse
    include:
      - libc6:amd64
      - libstdc++6:amd64
      - libgcc-s1:amd64
      - libgl1:amd64
      - libfontconfig1:amd64
      - libfreetype6:amd64
      - libx11-6:amd64
      - libxext6:amd64
      - libxcb1:amd64
      - libxcb-cursor0:amd64
      - libxcb-icccm4:amd64
      - libxcb-image0:amd64
      - libxcb-keysyms1:amd64
      - libxcb-render-util0:amd64
      - libxcb-shape0:amd64
      - libxcb-xinerama0:amd64
      - libxkbcommon-x11-0:amd64
    exclude:
      - adwaita-icon-theme:*
  runtime:
    env:
      XDG_DATA_DIRS: '/usr/local/share/:/usr/share/:${XDG_DATA_DIRS}'
  files:
    include: []
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/doc/*/TODO.*

AppImage:
  arch: x86_64
  update-information: guess
