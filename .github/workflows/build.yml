name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            artifact: mybarrier-linux-x86_64
            exe: build/mybarrier
          - name: macos-arm64
            os: macos-15
            artifact: mybarrier-macos-arm64
            exe: build/mybarrier
          - name: windows-x86_64
            os: windows-2022
            artifact: mybarrier-windows-x86_64
            exe: build/Release/mybarrier.exe

    steps:
      - uses: actions/checkout@v7
      - name: Install Windows package tools
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          $nsisPath = "${env:ProgramFiles(x86)}\NSIS"
          if (Test-Path $nsisPath) {
            Add-Content $env:GITHUB_PATH $nsisPath
          }
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.*"
          cache: true
      - name: Configure
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DMYBARRIER_BUILD_GUI=ON 2>&1 | tee build/configure.log
      - name: Build
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --config Release --parallel 2>&1 | tee build/build.log
      - name: Package installer
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --target package --config Release 2>&1 | tee build/package.log
      - name: Smoke test on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tests/smoke.sh ${{ matrix.exe }}
          tests/discovery_smoke.sh ${{ matrix.exe }}
          tests/barrier_config_smoke.sh ${{ matrix.exe }}
      - name: Copy artifact
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.artifact }}
          cp "${{ matrix.exe }}" dist/${{ matrix.artifact }}/
          cp README.md dist/${{ matrix.artifact }}/
          cp docs/build-artifacts.md dist/${{ matrix.artifact }}/
      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}-diagnostics
          path: build/*.log
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            build/mybarrier-*
